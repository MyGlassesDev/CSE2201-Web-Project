{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Motion</title>

    <link rel="stylesheet" href="{% static 'app/content/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'app/content/site.css' %}">
</head>
<body>

    <!-- Navigation bar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">Motion</a>
        </div>
    </nav>

    <!-- Registration form -->
    <section class="form-section py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="card p-4">

                        <h3 class="text-center mb-4">Register</h3>

                        <form action="{% url 'dashboard' %}" method="get">

                            <div class="mb-3">
                                <label for="fullname" class="form-label">Full Name</label>
                                <input type="text"
                                       class="form-control"
                                       id="fullname"
                                       name="fullname"
                                       placeholder="Enter your full name"
                                       required>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email"
                                       class="form-control"
                                       id="email"
                                       name="email"
                                       placeholder="Enter your email address"
                                       required>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password"
                                       class="form-control"
                                       id="password"
                                       name="password"
                                       placeholder="Enter your password"
                                       required>
                            </div>

                            <div class="mb-3">
                                <label for="confirmpassword" class="form-label">Confirm Password</label>
                                <input type="password"
                                       class="form-control"
                                       id="confirmpassword"
                                       name="confirmpassword"
                                       placeholder="Confirm your password"
                                       required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                Register
                            </button>

                        </form>

                        <p class="text-center mt-3">
                            Already have an account?
                            <a href="{% url 'login' %}">Log in here</a>
                        </p>

                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="{% static 'app/scripts/bootstrap.bundle.min.js' %}"></script>
</body>
</html>

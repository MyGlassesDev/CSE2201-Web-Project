{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - Motion</title>

    <link rel="stylesheet" href="{% static 'app/content/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'app/content/site.css' %}">
</head>
<body>

    <!-- NAVBAR -->
    {% include 'app/navbar.html' %}

    <!-- Calendar Section -->
    <section class="py-4">
        <div class="container">
            <div class="row">

                <!-- CALENDAR -->
                <div class="col-md-8">
                    <div class="card p-4">

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <button class="btn btn-outline-secondary" onclick="changeMonth(-1)">&lt;</button>
                            <h4 class="mb-0" id="monthYear"></h4>
                            <button class="btn btn-outline-secondary" onclick="changeMonth(1)">&gt;</button>
                        </div>

                        <table class="table table-bordered text-center">
                            <thead>
                                <tr>
                                    <th>Mon</th>
                                    <th>Tue</th>
                                    <th>Wed</th>
                                    <th>Thu</th>
                                    <th>Fri</th>
                                    <th>Sat</th>
                                    <th>Sun</th>
                                </tr>
                            </thead>

                            <tbody id="calendarBody">
                                <!-- Calendar dates will be added by JavaScript -->
                            </tbody>
                        </table>

                        <!-- ADD EVENT FORM -->
                        <div class="mt-3">
                            <input type="text" class="form-control mb-2" id="eventTitle" placeholder="Enter event title">

                            <input type="date" class="form-control mb-2" id="eventDate">

                            <input type="time" class="form-control mb-2" id="eventTime">

                            <button class="btn btn-primary" onclick="addEvent()">
                                + Add Event
                            </button>
                        </div>

                    </div>
                </div>

                <!-- UPCOMING EVENTS -->
                <div class="col-md-4">
                    <div class="card p-4">
                        <h5>Upcoming Events</h5>

                        <ul class="list-group list-group-flush" id="eventList">
                            <li class="list-group-item text-muted">
                                No upcoming events yet
                            </li>
                        </ul>

                        <div class="mt-3">
                            <a href="{% url 'reminders' %}" class="btn btn-outline-primary w-100">
                                Go to Reminders
                            </a>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </section>

    <script>
        let currentDate = new Date();

        // Load saved events from browser storage
        let events = JSON.parse(localStorage.getItem("motionCalendarEvents")) || [];

        function saveEvents() {
            localStorage.setItem("motionCalendarEvents", JSON.stringify(events));
        }

        function renderCalendar() {
            const monthYear = document.getElementById("monthYear");
            const calendarBody = document.getElementById("calendarBody");

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            const monthNames = [
                "January", "February", "March", "April", "May", "June",
                "July", "August", "September", "October", "November", "December"
            ];

            monthYear.textContent = monthNames[month] + " " + year;
            calendarBody.innerHTML = "";

            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);

            let startingDay = firstDay.getDay();

            // Convert Sunday-based week to Monday-based week
            startingDay = startingDay === 0 ? 6 : startingDay - 1;

            const totalDays = lastDay.getDate();

            let day = 1;

            for (let row = 0; row < 6; row++) {
                let tr = document.createElement("tr");

                for (let col = 0; col < 7; col++) {
                    let td = document.createElement("td");

                    if (row === 0 && col < startingDay) {
                        td.textContent = "";
                    } else if (day > totalDays) {
                        td.textContent = "";
                    } else {
                        const dateString = year + "-" +
                            String(month + 1).padStart(2, "0") + "-" +
                            String(day).padStart(2, "0");

                        const hasEvent = events.some(event => event.date === dateString);

                        td.innerHTML = day;

                        if (hasEvent) {
                            td.classList.add("table-primary");
                            td.style.cursor = "pointer";
                            td.title = "Click to view events";
                            td.innerHTML += "<br><small style='color:#0d6efd;'>• Event</small>";

                            td.addEventListener("click", function () {
                                showDayEvents(dateString);
                            });
                        }

                        day++;
                    }

                    tr.appendChild(td);
                }

                calendarBody.appendChild(tr);

                if (day > totalDays) {
                    break;
                }
            }
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendar();
        }

        function addEvent() {
            let title = document.getElementById("eventTitle").value;
            let date = document.getElementById("eventDate").value;
            let time = document.getElementById("eventTime").value;

            if (title === "" || date === "" || time === "") {
                alert("Please fill all fields");
                return;
            }

            events.push({
                title: title,
                date: date,
                time: time
            });

            saveEvents();
            updateEventList();
            renderCalendar();

            document.getElementById("eventTitle").value = "";
            document.getElementById("eventDate").value = "";
            document.getElementById("eventTime").value = "";
        }

        function updateEventList() {
            let eventList = document.getElementById("eventList");
            eventList.innerHTML = "";

            if (events.length === 0) {
                eventList.innerHTML =
                    '<li class="list-group-item text-muted">No upcoming events yet</li>';
                return;
            }

            events.forEach(function(event) {
                let item = document.createElement("li");
                item.className = "list-group-item";

                item.innerHTML =
                    "<strong>" + event.title + "</strong><br>" +
                    "Date: " + event.date + "<br>" +
                    "Time: " + event.time;

                eventList.appendChild(item);
            });
        }

        function showDayEvents(dateString) {
            const dayEvents = events.filter(event => event.date === dateString);

            if (dayEvents.length === 0) {
                alert("No events for this date.");
                return;
            }

            let message = "Events for " + dateString + "\n\n";

            dayEvents.forEach(event => {
                message += event.title + " (" + event.time + ")\n";
            });

            alert(message);
        }

        updateEventList();
        renderCalendar();
    </script>

    <script src="{% static 'app/scripts/bootstrap.bundle.min.js' %}"></script>

</body>
</html>

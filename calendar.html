<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - Motion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">Motion</a>
            <div class="ms-auto">
                <a href="dashboard.html" class="btn btn-outline-secondary me-2">Dashboard</a>
                <a href="notes.html" class="btn btn-outline-secondary me-2">Notes</a>
                <a href="reminders.html" class="btn btn-outline-secondary me-2">Reminders</a>
                <a href="login.html" class="btn btn-danger">Logout</a>
            </div>
        </div>
    </nav>

    <!-- Calendar Section -->
    <section class="py-4">
        <div class="container">
            <div class="row">

                <!-- CALENDAR -->
                <div class="col-md-8">
                    <div class="card p-4">

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <button class="btn btn-outline-secondary" onclick="changeMonth(-1)">&lt;</button>
                            <h4 class="mb-0" id="monthYear"></h4>
                            <button class="btn btn-outline-secondary" onclick="changeMonth(1)">&gt;</button>
                        </div>

                        <table class="table table-bordered text-center">
                            <thead>
                                <tr>
                                    <th>Mon</th>
                                    <th>Tue</th>
                                    <th>Wed</th>
                                    <th>Thu</th>
                                    <th>Fri</th>
                                    <th>Sat</th>
                                    <th>Sun</th>
                                </tr>
                            </thead>

                            <tbody id="calendarBody">
                                <!-- Calendar dates will be added by JavaScript -->
                            </tbody>
                        </table>

                        <!-- ADD EVENT FORM -->
                        <div class="mt-3">
                            <input type="text" class="form-control mb-2" id="eventTitle" placeholder="Enter event title">

                            <input type="date" class="form-control mb-2" id="eventDate">

                            <input type="time" class="form-control mb-2" id="eventTime">

                            <button class="btn btn-primary" onclick="addEvent()">
                                + Add Event
                            </button>
                        </div>

                    </div>
                </div>

                <!-- UPCOMING EVENTS -->
                <div class="col-md-4">
                    <div class="card p-4">
                        <h5>Upcoming Events</h5>

                        <ul class="list-group list-group-flush" id="eventList">
                            <li class="list-group-item text-muted">
                                No upcoming events yet
                            </li>
                        </ul>

                    </div>
                </div>

            </div>
        </div>
    </section>

    <script>
        let currentDate = new Date();
        let events = [];

        function renderCalendar() {
            const monthYear = document.getElementById("monthYear");
            const calendarBody = document.getElementById("calendarBody");

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            const monthNames = [
                "January", "February", "March", "April", "May", "June",
                "July", "August", "September", "October", "November", "December"
            ];

            monthYear.textContent = monthNames[month] + " " + year;
            calendarBody.innerHTML = "";

            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);

            let startingDay = firstDay.getDay();

            // Convert Sunday-based week to Monday-based week
            // Sunday = 0 becomes 6, Monday = 1 becomes 0
            startingDay = startingDay === 0 ? 6 : startingDay - 1;

            const totalDays = lastDay.getDate();

            let day = 1;

            for (let row = 0; row < 6; row++) {
                let tr = document.createElement("tr");

                for (let col = 0; col < 7; col++) {
                    let td = document.createElement("td");

                    if (row === 0 && col < startingDay) {
                        td.textContent = "";
                    } else if (day > totalDays) {
                        td.textContent = "";
                    } else {
                        td.textContent = day;

                        const dateString = year + "-" +
                            String(month + 1).padStart(2, "0") + "-" +
                            String(day).padStart(2, "0");

                        const hasEvent = events.some(event => event.date === dateString);

                        if (hasEvent) {
                            td.classList.add("table-primary");
                        }

                        day++;
                    }

                    tr.appendChild(td);
                }

                calendarBody.appendChild(tr);

                if (day > totalDays) {
                    break;
                }
            }
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendar();
        }

        function addEvent() {
            let title = document.getElementById("eventTitle").value;
            let date = document.getElementById("eventDate").value;
            let time = document.getElementById("eventTime").value;

            if (title === "" || date === "" || time === "") {
                alert("Please fill all fields");
                return;
            }

            events.push({
                title: title,
                date: date,
                time: time
            });

            updateEventList();
            renderCalendar();

            document.getElementById("eventTitle").value = "";
            document.getElementById("eventDate").value = "";
            document.getElementById("eventTime").value = "";
        }

        function updateEventList() {
            let eventList = document.getElementById("eventList");
            eventList.innerHTML = "";

            if (events.length === 0) {
                eventList.innerHTML =
                    '<li class="list-group-item text-muted">No upcoming events yet</li>';
                return;
            }

            events.forEach(function(event) {
                let item = document.createElement("li");
                item.className = "list-group-item";

                item.innerHTML =
                    "<strong>" + event.title + "</strong><br>" +
                    "Date: " + event.date + "<br>" +
                    "Time: " + event.time;

                eventList.appendChild(item);
            });
        }

        renderCalendar();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

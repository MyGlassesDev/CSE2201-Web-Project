{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Motion</title>

    <link rel="stylesheet" href="{% static 'app/content/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'app/content/site.css' %}">
</head>
<body>

    <!-- Navigation bar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">Motion</a>
        </div>
    </nav>

    <!-- Login form -->
    <section class="form-section py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="card p-4">
                        <h3 class="text-center mb-4">Login</h3>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" placeholder="Enter your email address">
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" placeholder="Enter your password">
                            <small class="text-muted">Must be 8 characters including letters and numbers</small>
                        </div>

                        <button class="btn btn-primary w-100">Log In</button>

                        <p class="text-center mt-3">
                            Don't have an account?
                            <a href="{% url 'register' %}">Create one here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="{% static 'app/scripts/bootstrap.bundle.min.js' %}"></script>
</body>
</html>

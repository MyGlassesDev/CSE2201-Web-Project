<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Motion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navigation bar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">Motion</a>
            <div class="ms-auto">
                <a href="notes.html" class="btn btn-outline-secondary me-2">Notes</a>
                <a href="calendar.html" class="btn btn-outline-secondary me-2">Calendar</a>
                <a href="reminders.html" class="btn btn-outline-secondary me-2">Reminders</a>
                <a href="login.html" class="btn btn-danger">Logout</a>
            </div>
        </div>
    </nav>

    <!-- Welcome message (want the username to be auto inserted) -->
    <section class="py-4">
        <div class="container">
            <h2>Welcome Back, [Username]</h2>
        </div>
    </section>

    <!-- Recent notes -->
    <section class="py-3">
        <div class="container">
            <h4>Recent Notes</h4>
            <div class="row">
                <div class="col-md-4">
                    <div class="card p-3">
                        <p>Note title (placeholder)</p>
                        <p>Note preview text here...</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-3">
                        <p>Note title (placeholder)</p>
                        <p>Note preview text here...</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-3 text-center">
                        <a href="notes.html">+ New Note</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Upcoming Events -->
    <section class="py-3">
        <div class="container">
            <h4>Upcoming Schedule</h4>
            <div class="card p-4">
                <p>No upcoming events. <a href="calendar.html">Add one here</a></p>
            </div>
        </div>
    </section>

    <!-- Reminders -->
    <section class="py-3">
        <div class="container">
            <h4>Reminders</h4>
            <div class="card p-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="reminder1">
                    <label class="form-check-label" for="reminder1">
                        No reminders yet
                    </label>
                </div>
                <p class="mt-2"><a href="reminders.html">View all reminders</a></p>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
